<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STL Cutter — tnij duże modele pod swoją drukarkę</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.45 system-ui, sans-serif; background: #15171b; color: #e6e8ea;
         display: grid; grid-template-columns: 340px 1fr; height: 100vh; }
  aside { padding: 16px; overflow-y: auto; border-right: 1px solid #2a2e35; }
  h1 { font-size: 16px; margin: 0 0 4px; }
  .badge { display: inline-block; font-size: 11px; color: #37d67a; border: 1px solid #2c5; border-radius: 999px;
           padding: 2px 9px; margin: 4px 0 14px; }
  label { display: block; margin: 11px 0 3px; color: #9aa3ad; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  input, select, button { width: 100%; padding: 7px 8px; background: #1d2026; color: #e6e8ea;
           border: 1px solid #2f343c; border-radius: 6px; font-size: 13px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .row3 > div > label { margin-top: 8px; }
  button { margin-top: 12px; cursor: pointer; font-weight: 600; }
  .primary { background: #2d6cdf; border-color: #2d6cdf; }
  button:disabled { opacity: .45; cursor: default; }
  button.on { background: #37d67a; border-color: #37d67a; color: #06210f; }
  hr { border: none; border-top: 1px solid #262a31; margin: 16px 0; }
  #log { margin-top: 10px; font: 11px/1.5 ui-monospace, monospace; white-space: pre-wrap; color: #8b95a1;
         max-height: 22vh; overflow-y: auto; }
  #pieceList { margin-top: 8px; display: grid; gap: 3px; }
  .piece { font: 12px/1.3 ui-monospace, monospace; color: #9fb3a6; }
  .piece.bad { color: #ff8a8a; }
  main { position: relative; }
  canvas { display: block; }
  .hint { position: absolute; left: 12px; bottom: 10px; font-size: 11px; color: #5c6671; }
</style>
</head>
<body>
<aside>
  <h1>STL Cutter</h1>
  <span class="badge">100% w przeglądarce — plik nie wychodzi na serwer</span>

  <label>Plik STL</label>
  <input type="file" id="file" accept=".stl">

  <label>Drukarka / pole robocze</label>
  <select id="preset"></select>
  <div class="row3" style="margin-top:6px">
    <input type="number" id="bx" value="256"><input type="number" id="by" value="256"><input type="number" id="bz" value="256">
  </div>

  <label>Typ złącza</label>
  <select id="connector">
    <option value="auto" selected>auto — pióro-wpust / kołek wg grubości</option>
    <option value="tongue">pióro-wpust wzdłuż szwu (eksperymentalne)</option>
    <option value="dowel">dowel — otwory + ręcznie kołek</option>
    <option value="plug">plug — wypust + gniazdo</option>
    <option value="none">brak — płaski styk</option>
  </select>

  <div class="row3">
    <div><label>Ø kołka</label><input type="number" id="pinD" value="5" step="0.5"></div>
    <div><label>Długość</label><input type="number" id="pinLen" value="14"></div>
    <div><label>Luz</label><input type="number" id="clearance" value="0.15" step="0.05"></div>
  </div>
  <div class="row3">
    <div><label>Margines</label><input type="number" id="margin" value="2"></div>
    <div><label>Min. ścianka</label><input type="number" id="minWall" value="1.2" step="0.1"></div>
    <div><label>Odstęp</label><input type="number" id="spacing" value="40"></div>
  </div>

  <button class="primary" id="plan" disabled>1 · Zaplanuj cięcia</button>

  <hr>
  <button id="editToggle" disabled>Edycja pinów: wył</button>
  <label>Aktywna płaszczyzna</label>
  <select id="activePlane"></select>
  <p class="hint" style="position:static;margin:6px 0 0">LPM = zaznacz/dodaj/przeciągnij · PPM = usuń. Zielony = zmieści się, czerwony = za cienko.</p>

  <div id="pinPanel" style="display:none;margin-top:10px;padding:8px;border:1px solid #2f343c;border-radius:6px">
    <div style="font-size:11px;color:#9aa3ad;margin-bottom:4px">Zaznaczony pin — kąt 3D</div>
    <label>Kąt pochylenia</label>
    <input type="range" id="tilt" min="0" max="70" step="1" value="0">
    <label>Obrót</label>
    <input type="range" id="az" min="0" max="359" step="1" value="0">
    <div id="angleOut" style="font:11px/1.4 ui-monospace,monospace;color:#8b95a1;margin-top:4px"></div>
  </div>

  <hr>
  <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;color:#e6e8ea;font-size:13px;margin:0 0 6px">
    <input type="checkbox" id="number" style="width:auto;margin:0"> Numeruj kawałki (grawer na ściance)
  </label>
  <button class="primary" id="cut" disabled>2 · Tnij i eksportuj</button>
  <label>Rozsunięcie (exploded)</label>
  <input type="range" id="explode" min="0" max="1.5" step="0.01" value="0">
  <button id="download" disabled>⬇ Pobierz ZIP</button>

  <div id="pieceList"></div>
  <div id="log"></div>
</aside>

<main>
  <canvas id="view"></canvas>
  <div class="hint">Przeciągnij plik STL tutaj. Obrót: LPM · przesuw: PPM/scroll.</div>
</main>

<script type="module" src="./app.js"></script>
</body>
</html>
